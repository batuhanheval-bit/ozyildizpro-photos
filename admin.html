<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ÖzyıldızPRO Admin Paneli</title>

  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: auto;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
      color: #222;
    }

    #photoList {
      margin-top: 20px;
    }

    .photo-item {
      background: white;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid #ddd;
    }

    .photo-item img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 6px;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    #downloadZip {
      width: 100%;
      margin-top: 20px;
      background: #28a745;
    }

    #downloadZip:hover {
      background: #1e7e34;
    }
  </style>
</head>
<body>

  <h1>📸 ÖzyıldızPRO Admin Paneli</h1>

  <label>
    Fotoğraf Yükle:
    <input type="file" id="photoUpload" accept="image/*">
  </label>

  <div id="photoList"></div>

  <button id="downloadZip">Seçilenleri ZIP Olarak İndir</button>

  <!-- ZIP KÜTÜPHANESİ -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <!-- Admin JS -->
  <script src="js/uploadPhotos.js"></script>
  <script src="js/admin.js"></script>

</body>
</html>
