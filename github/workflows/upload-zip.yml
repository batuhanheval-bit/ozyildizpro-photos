name: Upload Photos ZIP

on:
  repository_dispatch:
    types: [photo_zip_upload]

jobs:
  unzip_and_upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Repo’yu indir
        uses: actions/checkout@v3

      - name: ZIP dosyasını kaydet
        run: |
          echo "${{ github.event.client_payload.zip_base64 }}" | base64 -d > upload.zip

      - name: ZIP’i aç
        run: |
          mkdir extracted
          unzip upload.zip -d extracted

      - name: Fotoğrafları doğru klasöre taşı
        run: |
          CUSTOMER="${{ github.event.client_payload.customer }}"
          mkdir -p photos/$CUSTOMER
          cp -r extracted/* photos/$CUSTOMER/

      - name: Commit ve push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add .
          git commit -m "ZIP upload for ${{ github.event.client_payload.customer }}"
          git push
