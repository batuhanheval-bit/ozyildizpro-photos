name: Upload ZIP to GitHub

on:
  workflow_dispatch:
    inputs:
      customer:
        description: "Müşteri adı (sadece küçük harf, boşluksuz)"
        required: true
      zipfile:
        description: "Yüklenecek ZIP dosyası (base64 string olarak)"
        required: true

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Klasör oluştur
        run: mkdir -p photos/${{ github.event.inputs.customer }}

      - name: ZIP dosyasını oluştur
        run: |
          echo "${{ github.event.inputs.zipfile }}" | base64 --decode > photos/${{ github.event.inputs.customer }}/photos.zip

      - name: Repo checkout
        uses: actions/checkout@v3

      - name: Commit & Push
        run: |
          git config user.name "AutoUploader"
          git config user.email "actions@github.com"
          git add photos/${{ github.event.inputs.customer }}/photos.zip
          git commit -m "ZIP upload for ${{ github.event.inputs.customer }}"
          git push
